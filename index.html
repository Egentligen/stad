<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hur många svenska städer kan du nämna?</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
    
    <h1>Hur många svenska städer kan du nämna?</h1>

    <div class="map-container">
    
        <div class="input-container">
            <input type="text" id="cityInput" placeholder="Nämn någon svensk stad...">
        </div>

        <div id="stats">
            <p id="totalCities">Antal städer nämnda: 0</p>
            <p id="totalPopulation">Total population: 0</p>
        </div>

        <div class="zoom-controls">
            <button id="zoomIn">+</button>
            <button id="zoomOut">-</button>
        </div>

        <div class="image-box" id="imageBox">
            <div id="mapWrapper">
                <img id="swedenMap" src="map.png" alt="Map of Sweden">
                <div id="markerLayer"></div>
            </div>
        </div>
    </div>
    

    <div id="cityInfoHover" style="position:absolute; background:#f9f9f9; padding:5px 10px; border:1px solid #ccc; border-radius:4px; display:none; pointer-events:none; z-index:100;">
        <p id="hoverCityName"></p>
        <p id="hoverCityPopulation"></p>    
    </div>

    <script src="script.js"></script>

    <footer style="text-align:center; margin-top:20px; font-size:0.9em;">
        All city data is collected from GeoNames, licensed under a 
        <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">
         Creative Commons Attribution 4.0
        </a> license.
    </footer>

</body>
</html>

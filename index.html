<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hur många svenska städer kan du nämna?</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Swedish Cities Map</h1>

    <div class="input-container">
        <input type="text" id="cityInput" placeholder="Enter a Swedish city...">
        <button id="searchButton">Search</button>
    </div>

    <div class="map-container">

    <div class="zoom-controls">
        <button id="zoomIn">+</button>
        <button id="zoomOut">-</button>
    </div>

    <div class="image-box">

        <div id="mapWrapper">

            <img id="swedenMap" src="map.png" alt="Map of Sweden">

                <div id="markerLayer"></div>

            </div>

        </div>

    </div>

    <div id="cityInfo"></div>

    <script src="script.js"></script>

    <footer style="text-align:center; margin-top:20px; font-size:0.9em;">
        All city data is collected from GeoNames, licensed under a 
        <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">
         Creative Commons Attribution 4.0
        </a> license.
    </footer>

</body>
</html>
